x-signoz-defaults: &signoz-defaults
  restart: unless-stopped
  networks:
    - homelab_default
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

x-db-depend: &db-depend
  <<: *signoz-defaults
  depends_on:
    signoz-clickhouse:
      condition: service_healthy

services:
  signoz-init:
    <<: *signoz-defaults
    image: clickhouse/clickhouse-server:25.12.11@sha256:8a790dd3468db22b1d4e7b18a176f378ff5ff6053b9c48dd4ea1fa71a24c5ba6
    container_name: signoz-init
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mkdir -p /clickhouse-config /clickhouse-user-scripts /otel-config

        cat > /clickhouse-config/cluster.xml << 'XMLEOF'
        <?xml version="1.0"?>
        <clickhouse>
          <macros>
            <replica>signoz-clickhouse</replica>
            <shard>1</shard>
            <cluster>cluster</cluster>
          </macros>
          <zookeeper>
            <node index="1">
              <host>signoz-zookeeper</host>
              <port>2181</port>
            </node>
          </zookeeper>
          <remote_servers>
            <cluster>
              <shard>
                <replica>
                  <host>signoz-clickhouse</host>
                  <port>9000</port>
                </replica>
              </shard>
            </cluster>
          </remote_servers>
        </clickhouse>
        XMLEOF

        cat > /clickhouse-config/users.xml << 'XMLEOF'
        <?xml version="1.0"?>
        <clickhouse>
          <profiles>
            <default>
              <max_memory_usage>10000000000</max_memory_usage>
              <load_balancing>random</load_balancing>
            </default>
            <readonly>
              <readonly>1</readonly>
            </readonly>
          </profiles>
          <users>
            <default>
              <password></password>
              <networks>
                <ip>::/0</ip>
              </networks>
              <profile>default</profile>
              <quota>default</quota>
            </default>
          </users>
          <quotas>
            <default>
              <interval>
                <duration>3600</duration>
                <queries>0</queries>
                <errors>0</errors>
                <result_rows>0</result_rows>
                <read_rows>0</read_rows>
                <execution_time>0</execution_time>
              </interval>
            </default>
          </quotas>
        </clickhouse>
        XMLEOF

        cat > /clickhouse-config/custom-function.xml << 'XMLEOF'
        <functions>
          <function>
            <type>executable</type>
            <name>histogramQuantile</name>
            <return_type>Float64</return_type>
            <argument><type>Array(Float64)</type><name>buckets</name></argument>
            <argument><type>Array(Float64)</type><name>counts</name></argument>
            <argument><type>Float64</type><name>quantile</name></argument>
            <format>CSV</format>
            <command>./histogramQuantile</command>
          </function>
        </functions>
        XMLEOF

        # Download histogram quantile binary
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2Fv0.0.1/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xzf histogram-quantile.tar.gz
        mv histogram-quantile /clickhouse-user-scripts/histogramQuantile

        cat > /otel-config/otel-collector-config.yaml << 'YAMLEOF'
        connectors:
          signozmeter:
            metrics_flush_interval: 1h
            dimensions:
              - name: service.name
              - name: deployment.environment
              - name: host.name
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
                cors:
                  allowed_origins:
                    - "https://event.tylercash.dev"
                    - "https://event-staging.tylercash.dev"
                  allowed_headers:
                    - "Content-Type"
          prometheus:
            config:
              global:
                scrape_interval: 60s
              scrape_configs:
                - job_name: otel-collector
                  static_configs:
                    - targets:
                        - localhost:8888
                      labels:
                        job_name: otel-collector
        processors:
          batch:
            send_batch_size: 10000
            send_batch_max_size: 11000
            timeout: 10s
          batch/meter:
            send_batch_max_size: 25000
            send_batch_size: 20000
            timeout: 1s
          resourcedetection:
            detectors: [env, system]
            timeout: 2s
          signozspanmetrics/delta:
            metrics_exporter: signozclickhousemetrics
            metrics_flush_interval: 60s
            latency_histogram_buckets: [100us, 1ms, 2ms, 6ms, 10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 1400ms, 2000ms, 5s, 10s, 20s, 40s, 60s]
            dimensions_cache_size: 100000
            aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
            enable_exp_histogram: true
            dimensions:
              - name: service.namespace
                default: default
              - name: deployment.environment
                default: default
              - name: signoz.collector.id
              - name: service.version
              - name: browser.platform
              - name: browser.mobile
              - name: k8s.cluster.name
              - name: k8s.node.name
              - name: k8s.namespace.name
              - name: host.name
              - name: host.type
              - name: container.name
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
          pprof:
            endpoint: 0.0.0.0:1777
        exporters:
          clickhousetraces:
            datasource: tcp://signoz-clickhouse:9000/signoz_traces
            low_cardinal_exception_grouping: $${env:LOW_CARDINAL_EXCEPTION_GROUPING}
            use_new_schema: true
          signozclickhousemetrics:
            dsn: tcp://signoz-clickhouse:9000/signoz_metrics
          clickhouselogsexporter:
            dsn: tcp://signoz-clickhouse:9000/signoz_logs
            timeout: 10s
            use_new_schema: true
          signozclickhousemeter:
            dsn: tcp://signoz-clickhouse:9000/signoz_meter
            timeout: 45s
            sending_queue:
              enabled: false
          metadataexporter:
            cache:
              provider: in_memory
            dsn: tcp://signoz-clickhouse:9000/signoz_metadata
            enabled: true
            timeout: 45s
        service:
          telemetry:
            logs:
              encoding: json
          extensions:
            - health_check
            - pprof
          pipelines:
            traces:
              receivers: [otlp]
              processors: [signozspanmetrics/delta, batch]
              exporters: [clickhousetraces, metadataexporter, signozmeter]
            metrics:
              receivers: [otlp]
              processors: [batch]
              exporters: [signozclickhousemetrics, metadataexporter, signozmeter]
            metrics/prometheus:
              receivers: [prometheus]
              processors: [batch]
              exporters: [signozclickhousemetrics, metadataexporter, signozmeter]
            logs:
              receivers: [otlp]
              processors: [batch]
              exporters: [clickhouselogsexporter, metadataexporter, signozmeter]
            metrics/meter:
              receivers: [signozmeter]
              processors: [batch/meter]
              exporters: [signozclickhousemeter]
        YAMLEOF

        cat > /otel-config/manager-config.yaml << 'YAMLEOF'
        server_endpoint: ws://signoz:4320/v1/opamp
        YAMLEOF

        cat > /clickhouse-config/prometheus.xml << 'XMLEOF'
        <?xml version="1.0"?>
        <clickhouse>
          <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
            <asynchronous_metrics>true</asynchronous_metrics>
          </prometheus>
        </clickhouse>
        XMLEOF

        cat > /otel-config/otel-agent-config.yaml << 'YAMLEOF'
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
        receivers:
          filelog/docker:
            include:
              - /var/lib/docker/containers/*/*.log
            start_at: end
            include_file_path: true
            include_file_name: false
            operators:
              # Parse Docker JSON log wrapper {"log":"...","stream":"...","time":"..."}
              - type: json_parser
                id: parse-docker-json
                timestamp:
                  parse_from: attributes.time
                  layout: '%Y-%m-%dT%H:%M:%S.%LZ'
              # Extract container ID from file path
              - type: regex_parser
                id: extract-container-id
                regex: '^.*/containers/(?P<container_id>[a-f0-9]+)/.*$$'
                parse_from: attributes["log.file.path"]
              - type: move
                from: attributes.log
                to: body
              - type: remove
                field: attributes.time
              # Only attempt JSON body parsing if body starts with '{'
              - type: router
                id: route-json-body
                routes:
                  - output: try-parse-json-body
                    expr: 'body matches "^\\s*\\{"'
                default: parse-severity
              - type: json_parser
                id: try-parse-json-body
                parse_from: body
                on_error: send
              # Extract log level as severity if present
              - type: severity_parser
                id: parse-severity
                if: 'attributes.level != nil'
                parse_from: attributes.level
                on_error: send
                mapping:
                  debug: DEBUG
                  info: INFO
                  warn: WARN
                  warning: WARN
                  error: ERROR
                  fatal: FATAL
              # Replace body with the message field (logstash/logback format)
              - type: move
                id: move-message-to-body
                if: 'attributes.message != nil'
                from: attributes.message
                to: body
          docker_stats:
            endpoint: unix:///var/run/docker.sock
            collection_interval: 30s
            timeout: 20s
          hostmetrics:
            root_path: /hostfs
            collection_interval: 60s
            scrapers:
              cpu: {}
              load: {}
              memory: {}
              disk: {}
              filesystem: {}
              network: {}
              paging: {}
          prometheus/infra:
            config:
              scrape_configs:
                - job_name: clickhouse
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - signoz-clickhouse:9363
                - job_name: zookeeper
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - signoz-zookeeper:7000
                - job_name: navidrome
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - navidrome:4533
                - job_name: n8n
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - n8n:5678
        processors:
          batch:
            send_batch_size: 10000
            send_batch_max_size: 11000
            timeout: 10s
          resourcedetection:
            detectors: [env, system]
            timeout: 2s
          transform/set-service-name:
            log_statements:
              - context: log
                statements:
                  # Use Docker Compose service label as service.name (container name)
                  - set(resource.attributes["service.name"], attributes["attrs"]["com.docker.compose.service"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.service"] != nil
                  # Use Docker Compose project label as service.namespace (stack name)
                  - set(resource.attributes["service.namespace"], attributes["attrs"]["com.docker.compose.project"]) where attributes["attrs"] != nil and attributes["attrs"]["com.docker.compose.project"] != nil
                  # Fall back to service field from structured JSON body (e.g. logback/logstash)
                  - set(resource.attributes["service.name"], attributes["service"]) where resource.attributes["service.name"] == nil and attributes["service"] != nil
                  # Fall back to container_id for unstructured logs without compose labels
                  - set(resource.attributes["service.name"], attributes["container_id"]) where resource.attributes["service.name"] == nil or resource.attributes["service.name"] == ""
        exporters:
          otlp:
            endpoint: signoz-otel-collector:4317
            tls:
              insecure: true
        service:
          telemetry:
            logs:
              encoding: json
          extensions:
            - health_check
          pipelines:
            logs/docker:
              receivers: [filelog/docker]
              processors: [transform/set-service-name, batch]
              exporters: [otlp]
            metrics/docker:
              receivers: [docker_stats]
              processors: [batch]
              exporters: [otlp]
            metrics/host:
              receivers: [hostmetrics]
              processors: [resourcedetection, batch]
              exporters: [otlp]
            metrics/infra:
              receivers: [prometheus/infra]
              processors: [batch]
              exporters: [otlp]
        YAMLEOF

        echo "Init complete"
    volumes:
      - /ssd/databases/signoz/clickhouse-config:/clickhouse-config
      - /ssd/databases/signoz/clickhouse-user-scripts:/clickhouse-user-scripts
      - /ssd/databases/signoz/otel-config:/otel-config

  signoz-zookeeper:
    <<: *signoz-defaults
    image: signoz/zookeeper:3.9.3@sha256:2982759ec21211d52514154a5c87d2bbe6725d94cfa864cdfea2f7040b7bd365
    container_name: signoz-zookeeper
    user: root
    environment:
      ZOO_SERVER_ID: "1"
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_AUTOPURGE_INTERVAL: "1"
      ZOO_ENABLE_PROMETHEUS_METRICS: "yes"
      ZOO_PROMETHEUS_METRICS_PORT_NUMBER: "7000"
    volumes:
      - /ssd/databases/signoz/zookeeper:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  signoz-clickhouse:
    <<: *signoz-defaults
    image: clickhouse/clickhouse-server:25.12.11@sha256:8a790dd3468db22b1d4e7b18a176f378ff5ff6053b9c48dd4ea1fa71a24c5ba6
    container_name: signoz-clickhouse
    tty: true
    depends_on:
      signoz-init:
        condition: service_completed_successfully
      signoz-zookeeper:
        condition: service_healthy
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - /ssd/databases/signoz/clickhouse:/var/lib/clickhouse
      - /ssd/databases/signoz/clickhouse-config/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - /ssd/databases/signoz/clickhouse-config/users.xml:/etc/clickhouse-server/users.xml
      - /ssd/databases/signoz/clickhouse-config/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - /ssd/databases/signoz/clickhouse-config/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml
      - /ssd/databases/signoz/clickhouse-user-scripts:/var/lib/clickhouse/user_scripts
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true

  signoz-telemetrystore-migrator:
    <<: *db-depend
    image: signoz/signoz-otel-collector:v0.144.3@sha256:79311701ca0d27bad7b5c80d43ea43a2f2dc9169790e19e96b210847786c7b7f
    container_name: signoz-telemetrystore-migrator
    restart: on-failure
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up

  signoz:
    <<: *db-depend
    image: signoz/signoz:v0.121.1@sha256:332d8a554ccda480ed091d274fbf1370dd54743259596a5089b6f75cde71775b
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    container_name: signoz
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: ${SIGNOZ_JWT_SECRET}
    volumes:
      - /ssd/databases/signoz/data:/var/lib/signoz
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.signoz.service=signoz
      - traefik.http.routers.signoz.rule=Host(`signoz.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))
      - traefik.http.routers.signoz.entrypoints=websecure
      - traefik.http.services.signoz.loadbalancer.server.scheme=http
      - traefik.http.services.signoz.loadbalancer.server.port=8080
      - traefik.http.routers.signoz.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

  signoz-otel-collector:
    <<: *db-depend
    image: signoz/signoz-otel-collector:v0.144.3@sha256:79311701ca0d27bad7b5c80d43ea43a2f2dc9169790e19e96b210847786c7b7f
    container_name: signoz-otel-collector
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
      signoz-init:
        condition: service_completed_successfully
      signoz:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        echo "Waiting for migrations to complete..."
        until /signoz-otel-collector migrate sync check; do
          echo "Migrations not ready, retrying in 10s..."
          sleep 10
        done
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://signoz-clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    volumes:
      - /ssd/databases/signoz/otel-config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - /ssd/databases/signoz/otel-config/manager-config.yaml:/etc/manager-config.yaml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/13133"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.routers.signoz-otel.service=signoz-otel
      - traefik.http.routers.signoz-otel.rule=Host(`otel.tylercash.dev`)
      - traefik.http.routers.signoz-otel.entrypoints=websecure
      - traefik.http.services.signoz-otel.loadbalancer.server.scheme=http
      - traefik.http.services.signoz-otel.loadbalancer.server.port=4318
      - traefik.http.routers.signoz-otel.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

  signoz-otel-agent:
    <<: *signoz-defaults
    image: signoz/signoz-otel-collector:v0.144.3@sha256:79311701ca0d27bad7b5c80d43ea43a2f2dc9169790e19e96b210847786c7b7f
    container_name: signoz-otel-agent
    user: root
    depends_on:
      signoz-otel-collector:
        condition: service_healthy
      signoz-init:
        condition: service_completed_successfully
    command:
      - --config=/etc/otel-agent-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
    volumes:
      - /ssd/databases/signoz/otel-config/otel-agent-config.yaml:/etc/otel-agent-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /:/hostfs:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/13133"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true

networks:
  homelab_default:
    external: true
