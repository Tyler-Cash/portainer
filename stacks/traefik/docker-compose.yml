x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  traefik:
    <<: *logging
    image: traefik:v3.7.4@sha256:fcdef599e6259359833dd2e1d49f9e964f66825d69bd3dd468f51102ce013d03
    container_name: traefik
    restart: always
    networks:
      - homelab_default
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.forwardedHeaders.trustedIPs=127.0.0.1/32,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=127.0.0.1/32,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      # Logs + access logs are exported to the LGTM bundle via OTLP (same path
      # as metrics/tracing below). OTLP log records embed the active trace/span
      # IDs, so Loki ingests them as the `trace_id` structured-metadata field
      # that the Loki datasource's derived field + Tempo tracesToLogsV2 expect —
      # giving working log<->trace correlation and proper Grafana level
      # detection (OTLP severity -> level). The OTLP logs integration is still
      # experimental, hence the feature gate.
      - --experimental.otlpLogs=true
      - --log.level=INFO
      - --log.otlp=true
      - --log.otlp.grpc.endpoint=grafana-lgtm:4317
      - --log.otlp.grpc.insecure=true
      - --log.otlp.serviceName=traefik
      - --accesslog=true
      - --accesslog.otlp=true
      - --accesslog.otlp.grpc.endpoint=grafana-lgtm:4317
      - --accesslog.otlp.grpc.insecure=true
      - --accesslog.otlp.serviceName=traefik
      # Keep human-readable access logs on stdout too (for `docker logs`); the
      # stdout copy is NOT shipped to Loki — Alloy drops this container via the
      # loki.shipping=false label below — so there's no duplicate, untraced copy.
      - --accesslog.dualOutput=true
      - --api=true
      - --api.dashboard=true
      - --serversTransport.insecureSkipVerify=true
      - --certificatesresolvers.leresolver.acme.dnschallenge=true
      - --certificatesresolvers.leresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.leresolver.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.leresolver.acme.storage=/acme.json
      - --certificatesresolvers.leresolver.acme.dnsChallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --metrics.otlp=true
      - --metrics.otlp.grpc.endpoint=grafana-lgtm:4317
      - --metrics.otlp.grpc.insecure=true
      - --tracing.otlp=true
      - --tracing.otlp.grpc.endpoint=grafana-lgtm:4317
      - --tracing.otlp.grpc.insecure=true
    ports:
      - 80:80
      - 443:443
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /ssd/services/traefik/acme.json:/acme.json
    labels:
      - traefik.enable=true
      # Traefik ships its own logs to Loki via OTLP (trace-correlated). Drop the
      # container stdout copy here so Alloy doesn't double-ship an untraced,
      # lower-fidelity duplicate — same rationale as peep-bot's OTLP log path.
      - loki.shipping=false
      - traefik.http.routers.http-catchall.rule=hostregexp(`{host:.+}`)
      - traefik.http.routers.http-catchall.entrypoints=web
      - traefik.http.routers.http-catchall.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.traefik.rule=Host(`traefik.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

networks:
  homelab_default:
    external: true
