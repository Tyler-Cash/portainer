version: '3.8'

services:
  watchtower:
    image: containrrr/watchtower:1.7.1@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Australia/Sydney
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=30 4 */7 * *

  restic-gcs-backup:
    image: restic/restic:0.18.1@sha256:39d9072fb5651c80d75c7a811612eb60b4c06b32ffe87c2e9f3c7222e1797e76
    container_name: restic_zfs_gcs
    restart: unless-stopped
    environment:
      - RESTIC_PASSWORD=${RESTIC_PASSWORD}
      - RESTIC_BACKUP_ARGS=--ignore-inode
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - GCS_CREDS=${GCS_CREDS}
      - GCS_BASE_URL=${GCS_BASE_URL}
      - SKIP_DATASETS=ollama
      - SLEEP_INTERVAL=86400
    volumes:
      - type: bind
        source: /ssd/services
        target: /data/ssd/services
        read_only: true
        bind:
          propagation: rslave
      - type: bind
        source: /ssd/databases
        target: /data/ssd/databases
        read_only: true
        bind:
          propagation: rslave
    entrypoint:
      - /bin/sh
      - -c
      - |
        # --- Configuration ---
        CREDS_PATH="$$GOOGLE_APPLICATION_CREDENTIALS"
        DATA_ROOT="/data/ssd"

        # --- Functions ---

        log() {
            echo "[$$(date +%Y-%m-%d\ %H:%M:%S)] $$1"
        }

        send_error() {
            if command -v curl >/dev/null 2>&1 && [ -n "$$DISCORD_WEBHOOK_URL" ]; then
                curl -s -H "Content-Type: application/json" \
                    -d "{\"content\": \"❌ **Backup Error:** $$1\"}" \
                    "$$DISCORD_WEBHOOK_URL" > /dev/null
            fi
        }

        setup_gcs_creds() {
            [ -z "$$GCS_CREDS" ] && { log "CRITICAL: GCS_CREDS unset"; exit 1; }
            if [ ! -s "$$CREDS_PATH" ]; then
                echo "$$GCS_CREDS" | base64 -d > "$$CREDS_PATH"
                log "GCS Credentials initialized."
            fi
        }

        is_skipped() {
            echo "$$SKIP_DATASETS" | tr ',' ' ' | grep -qw "$$1"
        }

        init_or_check_repo() {
            REPO_PATH="$$1"
            if RESTIC_REPOSITORY="$$REPO_PATH" restic snapshots -n 1 < /dev/null > /dev/null 2>&1; then
                return 0
            fi
            OUTPUT=$$(RESTIC_REPOSITORY="$$REPO_PATH" restic cat config < /dev/null 2>&1)
            if echo "$$OUTPUT" | grep -iqE "Is a directory|does not exist|bucket not found|repository master key and config were not found"; then
                log "Repo $$REPO_PATH missing. Initializing..."
                if ! RESTIC_REPOSITORY="$$REPO_PATH" restic init < /dev/null > /dev/null 2>&1; then
                    log "CRITICAL: Failed to init $$REPO_PATH"
                    return 1
                fi
            else
                log "CRITICAL: Repo unreachable. Error: $$OUTPUT"
                return 1
            fi
            return 0
        }

        get_excludes() {
            app_name="$$1"
            BASE="--exclude .Trash --exclude .cache --exclude __pycache__ --exclude *.log --exclude tmp"
            case "$$app_name" in
                plex)
                    echo "$$BASE --exclude **/Metadata --exclude **/Cache --exclude **/Transcode" ;;
                sonarr|radarr|prowlarr)
                    echo "$$BASE --exclude **/MediaCover" ;;
                unifi)
                    echo "$$BASE --exclude **/autobackup" ;;
                *)
                    echo "$$BASE" ;;
            esac
        }

        discover_datasets() {
            for root in "$$DATA_ROOT/services" "$$DATA_ROOT/databases"; do
                [ -d "$$root/.zfs/snapshot" ] && echo "$$root"
                for child in "$$root"/*/; do
                    [ -d "$${child%/}/.zfs/snapshot" ] && echo "$${child%/}"
                done
            done | sort -u
        }

        backup_dataset() {
            dataset_path="$$1"
            repo_name=$$(echo "$$dataset_path" | sed "s|$$DATA_ROOT/||")
            app_name=$$(basename "$$dataset_path")

            if is_skipped "$$app_name"; then
                log "SKIP: $$app_name (in SKIP_DATASETS)"
                return 0
            fi

            snap_dir="$$dataset_path/.zfs/snapshot"
            LATEST_SNAP=$$(ls -1rt "$$snap_dir" 2>/dev/null | tail -n 1)
            if [ -z "$$LATEST_SNAP" ]; then
                log "SKIP: $$repo_name (no snapshots)"
                return 0
            fi

            backup_path="$$snap_dir/$$LATEST_SNAP"
            CURRENT_REPO="$$GCS_BASE_URL:/docker-backups/$$repo_name"
            log "[ACTION] $$repo_name (snapshot: $$LATEST_SNAP) -> $$CURRENT_REPO"

            if ! init_or_check_repo "$$CURRENT_REPO"; then
                send_error "Repo access failed for $$repo_name"
                return 1
            fi

            PARENT_ID=$$(RESTIC_REPOSITORY="$$CURRENT_REPO" restic snapshots --tag "$$repo_name" --latest 1 --json < /dev/null 2>/dev/null | sed -n 's/.*"short_id":"\([^"]*\)".*/\1/p')
            PARENT_ARGS=""
            if [ -n "$$PARENT_ID" ]; then
                PARENT_ARGS="--parent $$PARENT_ID"
                log "Found parent snapshot: $$PARENT_ID"
            fi

            FINAL_EXCLUDES=$$(get_excludes "$$app_name")

            if RESTIC_REPOSITORY="$$CURRENT_REPO" restic backup \
                $$PARENT_ARGS \
                $$FINAL_EXCLUDES \
                --host $$(hostname) "$$backup_path" \
                --tag "$$repo_name" \
                $$RESTIC_BACKUP_ARGS < /dev/null; then

                log "SUCCESS: $$repo_name"
                log "[CLEANUP] Pruning $$repo_name (Daily: 30, Weekly: 156)..."
                if RESTIC_REPOSITORY="$$CURRENT_REPO" restic forget \
                    --keep-daily 30 \
                    --keep-weekly 156 \
                    --prune \
                    < /dev/null; then
                    log "CLEANUP SUCCESS: $$repo_name"
                else
                    send_error "CLEANUP WARNING: Failed to prune $$repo_name"
                fi
            else
                log "FAILURE: $$repo_name"
                send_error "Backup failed for $$repo_name"
            fi

            sleep 2
        }

        # --- Main Execution ---

        while true; do
            setup_gcs_creds
            log "--- Starting Backup Cycle ---"
            log "Discovering ZFS datasets..."
            DATASETS=$$(discover_datasets)
            log "Found datasets:"
            for d in $$DATASETS; do
                log "  - $$(echo $$d | sed "s|$$DATA_ROOT/||")"
            done
            for dataset in $$DATASETS; do
                [ -n "$$dataset" ] && backup_dataset "$$dataset"
            done
            log "--- Cycle Finished. Sleeping 24h ---"
            sleep "$$SLEEP_INTERVAL"
        done
