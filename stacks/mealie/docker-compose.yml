x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  mealie:
    <<: *logging
    image: ghcr.io/mealie-recipes/mealie:v3.16.0@sha256:74496aed2c5055e3b7b6c4e1bb9b4f16b1f566601582b258a10bae851f19ac24
    container_name: mealie
    restart: unless-stopped
    networks:
      - homelab_default
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - /ssd/services/mealie:/app/data
    environment:
      - PUID=568
      - PGID=568
      - TZ=Australia/Sydney
      - ALLOW_SIGNUP=false
      - BASE_URL=https://mealie.tylercash.dev
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.mealie.service=mealie
      - traefik.http.routers.mealie.rule=Host(`mealie.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))
      - traefik.http.routers.mealie.entrypoints=websecure
      - traefik.http.services.mealie.loadbalancer.server.scheme=http
      - traefik.http.services.mealie.loadbalancer.server.port=9000
      - traefik.http.routers.mealie.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

networks:
  homelab_default:
    external: true