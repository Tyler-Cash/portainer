x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  zipline:
    <<: *logging
    image: ghcr.io/diced/zipline:4.6.3@sha256:a17f6a6fd2228c994a51c5341b237be930a9d8eb07fae6fc6a1157e63226b112
    container_name: zipline
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /hdd/media/zipline:/zipline/uploads
    environment:
      - CORE_RETURN_HTTPS=true
      - CORE_SECRET=${CORE_SECRET}
      - CORE_HOST=0.0.0.0
      - CORE_PORT=3000
      - CORE_DATABASE_URL=postgres://zipline:${DB_PASSWORD}@zipline-postgres:5432/zipline
      - DATASOURCE_TYPE=local
      - DATASOURCE_LOCAL_DIRECTORY=/zipline/uploads
    depends_on:
      zipline-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.zipline.service=zipline
      - traefik.http.routers.zipline.rule=Host(`video.tylercash.dev`)
      - traefik.http.routers.zipline.entrypoints=websecure
      - traefik.http.services.zipline.loadbalancer.server.scheme=http
      - traefik.http.services.zipline.loadbalancer.server.port=3000
      - traefik.http.routers.zipline.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

  zipline-postgres:
    <<: *logging
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    container_name: zipline-postgres
    restart: unless-stopped
    networks:
      - homelab_default
    environment:
      - POSTGRES_USER=zipline
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=zipline
    volumes:
      - /ssd/databases/zipline-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zipline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zipline-transcoder:
    <<: *logging
    build: ./transcoder
    container_name: zipline-transcoder
    restart: unless-stopped
    networks:
      - homelab_default
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - /hdd/media/zipline:/uploads
    environment:
      - WATCH_DIR=/uploads
      - TARGET_BITRATE=25M
      - MAX_BITRATE=28M
      - BUF_SIZE=50M
      - VAAPI_DEVICE=/dev/dri/renderD128

networks:
  homelab_default:
    external: true
