x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  zipline:
    <<: *logging
    # No stable v4 release tag exists yet (v4 only ships rolling commit-tagged
    # builds). Pinned to the digest the floating "v4" tag resolved to on
    # 2026-07-04 (built from commit 1c8adf4) — the tag label is just for
    # readability, the digest is what actually gets pulled.
    image: ghcr.io/diced/zipline:v4@sha256:da5157547b93cb18e28d3541cc96cbd04699760f71485176971412e2180c9c91
    container_name: zipline
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /hdd/media/zipline:/zipline/uploads
      - /ssd/services/zipline/public:/zipline/public
      - /ssd/services/zipline/themes:/zipline/themes
    environment:
      - CORE_RETURN_HTTPS_URLS=true
      - CORE_SECRET=${CORE_SECRET}
      - CORE_HOSTNAME=0.0.0.0
      - CORE_PORT=3000
      - DATABASE_URL=postgres://zipline:${DB_PASSWORD}@zipline-postgres:5432/zipline
      - DATASOURCE_TYPE=local
      - DATASOURCE_LOCAL_DIRECTORY=/zipline/uploads
    depends_on:
      zipline-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.zipline.service=zipline
      - traefik.http.routers.zipline.rule=Host(`video.tylercash.dev`)
      - traefik.http.routers.zipline.entrypoints=websecure
      - traefik.http.services.zipline.loadbalancer.server.scheme=http
      - traefik.http.services.zipline.loadbalancer.server.port=3000
      - traefik.http.routers.zipline.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

  zipline-postgres:
    <<: *logging
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    container_name: zipline-postgres
    restart: unless-stopped
    networks:
      - homelab_default
    environment:
      - POSTGRES_USER=zipline
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=zipline
    volumes:
      - /ssd/databases/zipline-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zipline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zipline-transcoder:
    <<: *logging
    build: ./transcoder
    container_name: zipline-transcoder
    restart: unless-stopped
    networks:
      - homelab_default
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - /hdd/media/zipline:/uploads
    environment:
      - WATCH_DIR=/uploads
      - TARGET_BITRATE=25M
      - MAX_BITRATE=28M
      - BUF_SIZE=50M
      - VAAPI_DEVICE=/dev/dri/renderD128

networks:
  homelab_default:
    external: true
