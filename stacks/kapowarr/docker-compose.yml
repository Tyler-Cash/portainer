services:
  kapowarr:
    image: mrcas/kapowarr:v1.3.1@sha256:d455797e4f2c5b1a8ccc5ce05c427f1af2179451bb1af195ca3fa8c3e928623b
    container_name: kapowarr
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /ssd/services/kapowarr:/app/db
      - /hdd/media/comics:/comics
      - /hdd/media/downloads/complete:/app/temp_downloads
    environment:
      - PUID=568
      - PGID=568
      - TZ=Australia/Sydney
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5656/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.kapowarr.service=kapowarr
      - traefik.http.routers.kapowarr.rule=Host(`comics.tylercash.dev`)
      - traefik.http.routers.kapowarr.entrypoints=websecure
      - traefik.http.services.kapowarr.loadbalancer.server.scheme=http
      - traefik.http.services.kapowarr.loadbalancer.server.port=5656
      - traefik.http.routers.kapowarr.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

networks:
  homelab_default:
    external: true