x-defaults: &defaults
  restart: unless-stopped
  networks:
    - homelab_default
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  grafana-lgtm-init:
    <<: *defaults
    # Renovate will pin digests on the next run.
    image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    container_name: grafana-lgtm-init
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /otel-config /grafana-data
        # Ensure /data is writable by the otel-lgtm bundled user (uid 472 = grafana)
        chown -R 472:472 /grafana-data

        cat > /otel-config/otel-agent-config.yaml << 'YAMLEOF'
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
        receivers:
          # Container log shipping is owned by the alloy stack (loki.source.docker).
          # This collector keeps only metrics receivers below.
          docker_stats:
            endpoint: unix:///var/run/docker.sock
            collection_interval: 30s
            timeout: 20s
          postgresql:
            endpoint: peepbot-postgres:5432
            transport: tcp
            username: postgres
            password: $${env:POSTGRES_PASSWORD}
            databases:
              - peepbot
            collection_interval: 60s
            tls:
              insecure: true
          prometheus/infra:
            config:
              scrape_configs:
                - job_name: navidrome
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - navidrome:4533
                - job_name: n8n
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - n8n:5678
                - job_name: grafana-lgtm
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - grafana-lgtm:3000
                - job_name: node-exporter
                  scrape_interval: 30s
                  static_configs:
                    - targets:
                        - node-exporter:9100
                - job_name: smartctl-exporter
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - smartctl-exporter:9633
        processors:
          batch:
            send_batch_size: 10000
            send_batch_max_size: 11000
            timeout: 10s
          resource/postgres:
            attributes:
              - key: service.name
                value: peepbot-postgres
                action: upsert
        exporters:
          otlp:
            endpoint: grafana-lgtm:4317
            tls:
              insecure: true
        service:
          telemetry:
            logs:
              encoding: json
          extensions:
            - health_check
          pipelines:
            metrics/docker:
              receivers: [docker_stats]
              processors: [batch]
              exporters: [otlp]
            metrics/infra:
              receivers: [prometheus/infra]
              processors: [batch]
              exporters: [otlp]
            metrics/postgres:
              receivers: [postgresql]
              processors: [resource/postgres, batch]
              exporters: [otlp]
        YAMLEOF

        echo "Init complete"
    volumes:
      - /ssd/databases/grafana-lgtm/otel-config:/otel-config
      - /ssd/databases/grafana-lgtm/data:/grafana-data

  grafana-lgtm:
    <<: *defaults
    image: grafana/otel-lgtm:0.28.0@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    container_name: grafana-lgtm
    depends_on:
      grafana-lgtm-init:
        condition: service_completed_successfully
    environment:
      # Sidestep the default `admin/admin` on first login.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.tylercash.dev
      # Anonymous OTLP/Grafana access disabled — auth via Grafana login.
      # Home dashboard: redirect / and the Home nav button to the peep-bot
      # Overview instead of the bundled "Welcome to Grafana" landing.
      GF_USERS_DEFAULT_HOME_DASHBOARD_UID: peepbot-overview
      # Discord webhook for Grafana Alerting. The contact-points.yaml
      # provisioning file references $GRAFANA_DISCORD_ALERT_WEBHOOK; Grafana
      # expands that at provisioning load time. The value lives in
      # stacks/grafana-lgtm/.env.secret (edit via `task edit STACK=grafana-lgtm`).
      GRAFANA_DISCORD_ALERT_WEBHOOK: ${GRAFANA_DISCORD_ALERT_WEBHOOK}
      # Ansible replaces this with a 12-char hash of the synced stack tree
      # so any change under stacks/grafana-lgtm/ (dashboard JSON, provisioning
      # yaml, etc.) forces a container recreate. Without this, compose sees
      # the compose-yml itself unchanged and won't pick up new bind-mounted
      # files — and a file→dir mount-source switch hangs runc.
      STACK_CONTENT_HASH: __STACK_CONTENT_HASH__
    volumes:
      - /ssd/databases/grafana-lgtm/data:/data
      - ./grafana/dashboards/peepbot:/etc/grafana/provisioning/peepbot:ro
      - ./grafana/provisioning/dashboards/peepbot.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/peepbot.yaml:ro
      - ./grafana/dashboards/homelab:/etc/grafana/provisioning/homelab:ro
      - ./grafana/provisioning/dashboards/homelab.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/homelab.yaml:ro
      # Alert rules. File mount (not dir) so the sibling HANDOVER.md / TODO.md
      # aren't exposed inside the container or parsed as YAML.
      - ./grafana/provisioning/alerting/peepbot.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/peepbot.yaml:ro
      - ./grafana/provisioning/alerting/contact-points.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/contact-points.yaml:ro
      - ./grafana/provisioning/alerting/notification-policies.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/notification-policies.yaml:ro
    # v0.28.0 ships its own healthcheck (/otel-lgtm/docker/healthcheck.sh) that
    # waits for Grafana + Loki + Tempo + Mimir + Pyroscope to all report ready.
    # Default 3×30s = 90s is too tight on a cold start; otel-agent's
    # depends_on:service_healthy then times out and the compose-up fails with
    # rc=1 even though the container converges shortly after. Wider window:
    healthcheck:
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      traefik.enable: "true"
      # Grafana UI — internal network only (matches SigNoz UI access pattern)
      traefik.http.routers.grafana.service: grafana
      traefik.http.routers.grafana.rule: "Host(`grafana.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))"
      traefik.http.routers.grafana.entrypoints: websecure
      traefik.http.routers.grafana.tls.certresolver: leresolver
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
      # OTLP HTTP — used by browser RUM and any external pusher
      traefik.http.routers.grafana-otel.service: grafana-otel
      traefik.http.routers.grafana-otel.rule: "Host(`otel.tylercash.dev`)"
      traefik.http.routers.grafana-otel.entrypoints: websecure
      traefik.http.routers.grafana-otel.tls.certresolver: leresolver
      traefik.http.services.grafana-otel.loadbalancer.server.port: "4318"
      com.centurylinklabs.watchtower.enable: "true"

  otel-agent:
    <<: *defaults
    image: otel/opentelemetry-collector-contrib:0.152.1@sha256:fa1f6ea8dabd3042fabf4411eed7fa52f253edd8940140bec89a573e62a24eb7
    container_name: otel-agent
    # `user: root` fails — image is scratch-based with no /etc/passwd, so
    # `root` can't be resolved by name. Use the numeric UID:GID instead.
    # Needs to be root-equivalent for /var/run/docker.sock access.
    user: "0:0"
    depends_on:
      grafana-lgtm-init:
        condition: service_completed_successfully
      grafana-lgtm:
        # service_started, not service_healthy. The image's bundled healthcheck
        # waits for all 5 LGTM services to ready up, taking several minutes
        # on cold start — compose-up would time out the wait before otel-agent
        # ever launched. OTLP has its own retry logic so it's fine to start
        # early and wait for the endpoint to come up in-band.
        condition: service_started
    command:
      - --config=/etc/otel-agent-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=homelab,os.type=linux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /ssd/databases/grafana-lgtm/otel-config/otel-agent-config.yaml:/etc/otel-agent-config.yaml
      # Only mount left: docker_stats receiver needs the daemon socket. Host
      # metrics now come from the dedicated node-exporter container (scoped,
      # non-root) which otel-agent scrapes via prometheus/infra.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # The contrib image is `scratch`-based and has no shell, so we can't easily
    # probe :13133 from inside. Container exit on collector crash is sufficient
    # given depends_on with service_healthy upstream — restart policy will cycle.
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # Host metrics — scoped replacement for otel-agent's hostmetrics receiver.
  # Runs as `nobody`, read-only root filesystem, all caps dropped. The `/`
  # mount is read-only and the container can't escalate, so the blast radius
  # is "an attacker can read what nobody can read on the host" — far tighter
  # than the previous otel-agent setup that ran as root with /:/hostfs:ro.
  node-exporter:
    <<: *defaults
    # Renovate will pin digests on the next run.
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    user: nobody
    read_only: true
    cap_drop:
      - ALL
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.netclass.ignored-devices=^(veth.*|docker.*|br-.*|lo)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # SMART disk health. Discovers devices fine with CAP_SYS_RAWIO + CAP_SYS_ADMIN
  # but the underlying SCSI/ATA ioctls are blocked by Docker's default AppArmor
  # profile — logs showed "Operation not permitted" on every /dev/sd*.
  # apparmor:unconfined lifts that restriction. Still tighter than
  # privileged: true (no host networking, no /dev:rw, no all-caps).
  smartctl-exporter:
    <<: *defaults
    # Renovate will pin digests on the next run.
    image: quay.io/prometheuscommunity/smartctl-exporter:v0.14.0@sha256:cfe22c36d7d2fac48ebf619707305acb65eb0fb670656eb80f356e606d782bc1
    container_name: smartctl-exporter
    user: root
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      # /dev must be rw, not :ro. smartctl opens devices with O_RDWR before
      # issuing the (read-only) SMART ioctl, and a :ro mount blocks the
      # open() call with EPERM. The kernel still enforces that SMART ioctls
      # don't modify data, so this isn't actually elevated risk.
      - /dev:/dev
    labels:
      com.centurylinklabs.watchtower.enable: "true"

networks:
  homelab_default:
    external: true
