x-defaults: &defaults
  restart: unless-stopped
  networks:
    - homelab_default
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  grafana-lgtm-init:
    <<: *defaults
    # Renovate will pin digests on the next run.
    image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    container_name: grafana-lgtm-init
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /otel-config /grafana-data
        # Ensure /data is writable by the otel-lgtm bundled user (uid 472 = grafana)
        chown -R 472:472 /grafana-data

        cat > /otel-config/otel-agent-config.yaml << 'YAMLEOF'
        extensions:
          health_check:
            endpoint: 0.0.0.0:13133
        receivers:
          # Container log shipping is owned by the alloy stack (loki.source.docker).
          # This collector keeps only metrics receivers below.
          docker_stats:
            endpoint: unix:///var/run/docker.sock
            collection_interval: 30s
            timeout: 20s
          postgresql:
            endpoint: peepbot-postgres:5432
            transport: tcp
            username: postgres
            password: $${env:POSTGRES_PASSWORD}
            databases:
              - peepbot
            collection_interval: 60s
            tls:
              insecure: true
          prometheus/infra:
            config:
              scrape_configs:
                - job_name: navidrome
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - navidrome:4533
                - job_name: n8n
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - n8n:5678
                - job_name: grafana-lgtm
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - grafana-lgtm:3000
                - job_name: node-exporter
                  scrape_interval: 30s
                  static_configs:
                    - targets:
                        - node-exporter:9100
                - job_name: smartctl-exporter
                  scrape_interval: 60s
                  static_configs:
                    - targets:
                        - smartctl-exporter:9633
        processors:
          batch:
            send_batch_size: 1000000
            send_batch_max_size: 1100000
            timeout: 60s
          resource/postgres:
            attributes:
              - key: service.name
                value: peepbot-postgres
                action: upsert
        exporters:
          otlp:
            endpoint: grafana-lgtm:4317
            tls:
              insecure: true
        service:
          telemetry:
            logs:
              encoding: json
          extensions:
            - health_check
          pipelines:
            metrics/docker:
              receivers: [docker_stats]
              processors: [batch]
              exporters: [otlp]
            metrics/infra:
              receivers: [prometheus/infra]
              processors: [batch]
              exporters: [otlp]
            metrics/postgres:
              receivers: [postgresql]
              processors: [resource/postgres, batch]
              exporters: [otlp]
        YAMLEOF

        echo "Init complete"
    volumes:
      - /ssd/databases/grafana-lgtm/otel-config:/otel-config
      - /ssd/databases/grafana-lgtm/data:/grafana-data

  grafana-lgtm:
    <<: *defaults
    image: grafana/otel-lgtm:0.29.0@sha256:6e14b923e0130b8b294ca5bcc7c94d54e899d150817e6c3ed82d9b665afe5499
    container_name: grafana-lgtm
    depends_on:
      grafana-lgtm-init:
        condition: service_completed_successfully
    environment:
      # Sidestep the default `admin/admin` on first login.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.tylercash.dev
      # Anonymous OTLP/Grafana access disabled — auth via Grafana login.
      # Home dashboard is set via the org preferences API (one-time PATCH to
      # /api/org/preferences with {"homeDashboardUID":"peepbot-overview"}).
      # The value persists in Grafana's sqlite under /data/grafana so it
      # survives recreates. GF_USERS_DEFAULT_HOME_DASHBOARD_PATH was tried
      # here and silently ignored in this Grafana 13 build, so it's not set.
      # Discord webhook for Grafana Alerting. The contact-points.yaml
      # provisioning file references $GRAFANA_DISCORD_ALERT_WEBHOOK; Grafana
      # expands that at provisioning load time. The value lives in
      # stacks/grafana-lgtm/.env.secret (edit via `task edit STACK=grafana-lgtm`).
      GRAFANA_DISCORD_ALERT_WEBHOOK: ${GRAFANA_DISCORD_ALERT_WEBHOOK}
      # Ansible replaces this with a 12-char hash of the synced stack tree
      # so any change under stacks/grafana-lgtm/ (dashboard JSON, provisioning
      # yaml, etc.) forces a container recreate. Without this, compose sees
      # the compose-yml itself unchanged and won't pick up new bind-mounted
      # files — and a file→dir mount-source switch hangs runc.
      STACK_CONTENT_HASH: __STACK_CONTENT_HASH__
    volumes:
      - /ssd/databases/grafana-lgtm/data:/data
      - ./grafana/dashboards/peepbot:/etc/grafana/provisioning/peepbot:ro
      - ./grafana/provisioning/dashboards/peepbot.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/peepbot.yaml:ro
      - ./grafana/dashboards/homelab:/etc/grafana/provisioning/homelab:ro
      - ./grafana/provisioning/dashboards/homelab.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/homelab.yaml:ro
      # Override otel-lgtm's built-in datasources file (same in-image path = clean override, no
      # duplicate-uid conflict) with a faithful copy that adds Tempo's tracesToProfiles link to
      # Pyroscope. Covered by STACK_CONTENT_HASH so edits force a grafana recreate + re-provision.
      - ./grafana/provisioning/datasources/grafana-datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml:ro
      # Alert rules. File mount (not dir) so the sibling HANDOVER.md / TODO.md
      # aren't exposed inside the container or parsed as YAML.
      - ./grafana/provisioning/alerting/peepbot.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/peepbot.yaml:ro
      - ./grafana/provisioning/alerting/contact-points.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/contact-points.yaml:ro
      - ./grafana/provisioning/alerting/notification-policies.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/notification-policies.yaml:ro
      - ./grafana/provisioning/alerting/homelab.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/homelab.yaml:ro
    # v0.28.0 ships its own healthcheck (/otel-lgtm/docker/healthcheck.sh) that
    # waits for Grafana + Loki + Tempo + Mimir + Pyroscope to all report ready.
    # Default 3×30s = 90s is too tight on a cold start; otel-agent's
    # depends_on:service_healthy then times out and the compose-up fails with
    # rc=1 even though the container converges shortly after. Wider window:
    healthcheck:
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      traefik.enable: "true"
      # Grafana UI — internal network only (matches SigNoz UI access pattern)
      traefik.http.routers.grafana.service: grafana
      traefik.http.routers.grafana.rule: "Host(`grafana.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))"
      traefik.http.routers.grafana.entrypoints: websecure
      traefik.http.routers.grafana.tls.certresolver: leresolver
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
      # OTLP HTTP (:4318). Split by source so an unauthenticated Tempo never
      # faces the internet:
      #   - internal clients (LAN + docker net, same pattern as the grafana
      #     router) get full, unauthenticated access on all paths;
      #   - external clients reach ONLY the /v1/traces ingest path, behind
      #     basicauth. Any other external path matches no router → 404.
      # Internal: full access, no auth.
      traefik.http.routers.grafana-otel-internal.service: grafana-otel
      traefik.http.routers.grafana-otel-internal.rule: "Host(`otel.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))"
      traefik.http.routers.grafana-otel-internal.priority: "100"
      traefik.http.routers.grafana-otel-internal.entrypoints: websecure
      traefik.http.routers.grafana-otel-internal.tls.certresolver: leresolver
      # External: ingest path only, basicauth required. Users list (htpasswd
      # bcrypt entries, comma-separated) is sourced from .env.secret so the
      # hashes stay out of the plaintext compose file.
      traefik.http.routers.grafana-otel-external.service: grafana-otel
      traefik.http.routers.grafana-otel-external.rule: "Host(`otel.tylercash.dev`) && PathPrefix(`/v1/traces`)"
      traefik.http.routers.grafana-otel-external.priority: "50"
      traefik.http.routers.grafana-otel-external.entrypoints: websecure
      traefik.http.routers.grafana-otel-external.tls.certresolver: leresolver
      traefik.http.routers.grafana-otel-external.middlewares: otel-basicauth
      traefik.http.middlewares.otel-basicauth.basicauth.users: "${OTEL_BASICAUTH_USERS}"
      traefik.http.services.grafana-otel.loadbalancer.server.port: "4318"
      com.centurylinklabs.watchtower.enable: "true"

  otel-agent:
    <<: *defaults
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    container_name: otel-agent
    # `user: root` fails — image is scratch-based with no /etc/passwd, so
    # `root` can't be resolved by name. Use the numeric UID:GID instead.
    # Needs to be root-equivalent for /var/run/docker.sock access.
    user: "0:0"
    depends_on:
      grafana-lgtm-init:
        condition: service_completed_successfully
      grafana-lgtm:
        # service_started, not service_healthy. The image's bundled healthcheck
        # waits for all 5 LGTM services to ready up, taking several minutes
        # on cold start — compose-up would time out the wait before otel-agent
        # ever launched. OTLP has its own retry logic so it's fine to start
        # early and wait for the endpoint to come up in-band.
        condition: service_started
    command:
      - --config=/etc/otel-agent-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=homelab,os.type=linux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /ssd/databases/grafana-lgtm/otel-config/otel-agent-config.yaml:/etc/otel-agent-config.yaml
      # Only mount left: docker_stats receiver needs the daemon socket. Host
      # metrics now come from the dedicated node-exporter container (scoped,
      # non-root) which otel-agent scrapes via prometheus/infra.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # The contrib image is `scratch`-based and has no shell, so we can't easily
    # probe :13133 from inside. Container exit on collector crash is sufficient
    # given depends_on with service_healthy upstream — restart policy will cycle.
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # Host metrics — scoped replacement for otel-agent's hostmetrics receiver.
  # Runs as `nobody`, read-only root filesystem, all caps dropped. The `/`
  # mount is read-only and the container can't escalate, so the blast radius
  # is "an attacker can read what nobody can read on the host" — far tighter
  # than the previous otel-agent setup that ran as root with /:/hostfs:ro.
  node-exporter:
    <<: *defaults
    # Renovate will pin digests on the next run.
    image: prom/node-exporter:v1.12.0@sha256:9b0ade5e607f9dbedb0a8e11151b6011ae5bd79304c261804cfdd2cadf200a80
    container_name: node-exporter
    user: nobody
    read_only: true
    cap_drop:
      - ALL
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.netclass.ignored-devices=^(veth.*|docker.*|br-.*|lo)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # SMART disk health.
  #
  # Tried scoped permissions (cap_add: SYS_RAWIO + SYS_ADMIN,
  # apparmor:unconfined, /dev:rw) and every SMART ioctl still came back
  # "Operation not permitted". Docker's default seccomp profile blocks the
  # raw SG_IO / ATA_PASSTHRU ioctls smartctl issues — those gates aren't
  # exposed via cap_add. The community's recommended config (matching the
  # upstream Docker example) is just privileged: true, which lifts seccomp
  # + apparmor + grants all caps. For a single-tenant homelab the trust
  # model accepts this; the container is the official prom-community image.
  smartctl-exporter:
    <<: *defaults
    # Renovate will pin digests on the next run.
    image: quay.io/prometheuscommunity/smartctl-exporter:v0.14.0@sha256:cfe22c36d7d2fac48ebf619707305acb65eb0fb670656eb80f356e606d782bc1
    container_name: smartctl-exporter
    # Image defaults USER to `nobody` for HTTP-serving safety; combined with
    # the host's /dev/sd* being mode 0660 root:disk that means EACCES on open.
    # Run as root (numeric — image is scratch-ish, no name resolution).
    # Privileged is needed to bypass Docker's seccomp gate on SG_IO ioctls
    # (cap_add alone wasn't enough).
    user: "0:0"
    privileged: true
    volumes:
      - /dev:/dev
    labels:
      com.centurylinklabs.watchtower.enable: "true"

networks:
  homelab_default:
    external: true
