# Overrides otel-lgtm v0.28.0's built-in /otel-lgtm/grafana/conf/provisioning/datasources/
# grafana-datasources.yaml (mounted at that exact path in docker-compose.yml). This is a faithful
# copy of the image's datasources PLUS `tracesToProfiles` on Tempo, so a trace span links to the
# matching Pyroscope flame graph (span service.name -> Pyroscope service_name). Keep in sync with
# upstream on otel-lgtm bumps: github.com/grafana/docker-otel-lgtm docker/grafana-datasources.yaml.
# NB: `$$` escapes a literal `$` from Grafana's provisioning env interpolation — do not unescape.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://127.0.0.1:9090
    editable: true
    jsonData:
      timeInterval: 60s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "Trace: $${__value.raw}"

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://127.0.0.1:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        customQuery: true
        datasourceUid: "loki"
        query: '{$${__tags}} | trace_id = "$${__trace.traceId}"'
        tags:
          - key: "service.name"
            value: "service_name"

      # Link a span to its Pyroscope flame graph. Maps the span's service.name to Pyroscope's
      # service_name label; defaults to the CPU profile. Added on top of otel-lgtm's base config.
      tracesToProfiles:
        datasourceUid: "pyroscope"
        profileTypeId: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
        customQuery: false
        tags:
          - key: "service.name"
            value: "service_name"

      serviceMap:
        datasourceUid: "prometheus"
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: "loki"

  - name: Loki
    type: loki
    uid: loki
    url: http://127.0.0.1:3100
    editable: true
    jsonData:
      derivedFields:
        - name: "trace_id"
          matcherType: "label"
          matcherRegex: "trace_id"
          url: "$${__value.raw}"
          datasourceUid: "tempo"
          urlDisplayLabel: "Trace: $${__value.raw}"

  - name: Pyroscope
    type: grafana-pyroscope-datasource
    uid: pyroscope
    url: http://127.0.0.1:4040
