apiVersion: 1

# Notification policy tree for Peep Bot alerts.
#
# Top-level routes by severity label (set in each rule in peepbot.yaml).
# Critical pages fast (30s wait, 5m grouping, 1h repeat); warning is
# patient (2m wait, 10m grouping, 4h repeat) so background noise doesn't
# wear out the channel.

policies:
  - orgId: 1
    receiver: peepbot-discord
    group_by: [alertname, component, severity]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: null-receiver
        matchers:
          - severity = info
        # Group aggressively — these never page, so we don't need fine-grained
        # delivery timing.
        group_wait: 5m
        group_interval: 1h
        repeat_interval: 24h
        continue: false
      - receiver: peepbot-discord
        matchers:
          - severity = critical
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
        continue: false
      - receiver: peepbot-discord
        matchers:
          - severity = warning
        group_wait: 2m
        group_interval: 10m
        repeat_interval: 4h
        continue: false
