apiVersion: 1

# Alert rules for the Peep Bot Spring Boot backend.
#
# Metric names follow the OTel-exposed Micrometer convention used in the
# Peep Bot dashboards (e.g. `executor_queued_tasks`, not `discordListenerExecutor_queued`).
# Selectors mirror the dashboards: service_namespace="peep-bot", and we leave
# service_name / deployment_environment_name unconstrained so a rule fires
# regardless of which env (prod/staging) is affected — the env appears in
# the alert labels via the `summary` annotation.
#
# Wiring: mount this file at
#   /otel-lgtm/grafana/conf/provisioning/alerting/peepbot.yaml
# alongside the dashboards mount in docker-compose.yml.

groups:
  - orgId: 1
    name: peepbot-critical
    folder: Peep Bot
    interval: 1m
    rules:
      # ──────────────────────────────────────────────────────────────────────
      # Discord interaction "Unknown interaction" (10062) errors.
      # Root cause: a listener missed the 3-second ack budget. The
      # ListenerNoCompleteCallsTest guard catches this at build time, so any
      # production hit is a regression worth paging on immediately.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-discord-10062
        title: Discord interaction 10062 (Unknown interaction)
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              refId: A
              expr: sum(count_over_time({service_namespace="peep-bot"} |= "10062" [5m]))
              queryType: instant
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        labels:
          severity: critical
          component: discord
        annotations:
          summary: "Peep Bot logged Discord 10062 (Unknown interaction)"
          description: |
            A Discord listener tried to edit/reply to an interaction after the
            3-second ack budget expired. ListenerNoCompleteCallsTest exists to
            prevent this — production occurrences mean a new code path is
            using `.complete()` or blocking before `defer*().queue()`.

            Find the offending listener:
              {service_namespace="peep-bot"} |= "10062"

      # ──────────────────────────────────────────────────────────────────────
      # Discord listener executor queue saturating. Queue capacity is 512 with
      # CallerRunsPolicy, so at 512 the JDA WebSocket read thread blocks —
      # exactly how the 3-second ack budget gets missed.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-discord-queue-saturated
        title: Discord listener executor queue saturating
        condition: B
        for: 1m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: max(executor_queued_tasks{service_namespace="peep-bot", name="discordListenerExecutor"})
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [400] }
        labels:
          severity: critical
          component: discord
        annotations:
          summary: "discordListenerExecutor queue > 400 (capacity 512)"
          description: |
            At 512 the JDA WS thread runs the task inline (CallerRunsPolicy)
            and ack budget breaches become very likely. Check for a downstream
            block: Discord API outage, a runaway listener, or a JDBC stall.

      # ──────────────────────────────────────────────────────────────────────
      # Lifecycle saga: durable listener stuck (attempts > 24, hours stale).
      # If any listener has stuck > 0 for 30m, the saga is wedged on it.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-lifecycle-stuck
        title: Lifecycle listener stuck (durable retry exhausted)
        condition: B
        for: 30m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: max by (listener) (event_lifecycle_listener_stuck{service_namespace="peep-bot"})
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        labels:
          severity: critical
          component: lifecycle
        annotations:
          summary: "Lifecycle listener {{ $labels.listener }} has stuck invocations"
          description: |
            A durable listener invocation has retried past its attempt budget
            and is stuck FAILED. Events depending on this listener
            (notify / completion / archival / delete) are not being processed.

            Look at the listener_invocation table for rows with status='FAILED'
            and the matching listener name to see the failure reason.

      # ──────────────────────────────────────────────────────────────────────
      # Lifecycle tick heartbeat. EventTickScheduler runs every minute and
      # is the canary for "is the scheduler thread alive". Zero published
      # ticks for 15m while the app is up means the cron is dead or
      # ShedLock is stuck on a phantom lock holder.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-lifecycle-tick-silent
        title: Lifecycle tick heartbeat silent
        condition: B
        for: 15m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              # Sum across all tick types; if ANY are firing we're healthy.
              # `up` clause prevents false positives during a real outage —
              # if the process is down, peepbot-up-down covers that case.
              expr: |
                (sum(rate(event_lifecycle_published_total{service_namespace="peep-bot"}[15m])) or vector(0))
                and on() (sum(up{service_namespace="peep-bot"}) > 0)
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [0.0001] }
        labels:
          severity: critical
          component: lifecycle
        annotations:
          summary: "No lifecycle ticks published in 15 minutes"
          description: |
            EventTickScheduler (cron `0 * * * * *`) has stopped emitting
            EventPreNotifyDue / EventCompletionDue / EventArchivalDue /
            EventDeleteRequested. Either the scheduler thread died or
            ShedLock is holding a stale lock.

            Check: shedlock table for stale lock_until values, and the JVM
            scheduler-pool threads.

      # ──────────────────────────────────────────────────────────────────────
      # Sustained 5xx rate from the backend. Spring's auto-bound
      # http.server.requests timer carries an `outcome` tag.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-http-5xx
        title: Backend HTTP 5xx rate elevated
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                sum(rate(http_server_requests_milliseconds_count{
                  service_namespace="peep-bot",
                  outcome="SERVER_ERROR"
                }[5m]))
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.1] }
        labels:
          severity: critical
          component: http
        annotations:
          summary: "Backend 5xx rate > 0.1 req/s for 5m"
          description: |
            See the HTTP dashboard for the offending URIs:
            topk(5, sum by (uri) (rate(http_server_requests_milliseconds_count{outcome="SERVER_ERROR"}[5m])))

      # ──────────────────────────────────────────────────────────────────────
      # Hikari connection timeouts — a connection couldn't be acquired before
      # the timeout. This always indicates real pain (pool exhaustion or a
      # query holding a connection too long).
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-hikari-timeouts
        title: Hikari connection acquisition timeouts
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: sum(rate(hikaricp_connections_timeout_total{service_namespace="peep-bot"}[5m]))
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        labels:
          severity: critical
          component: db
        annotations:
          summary: "Hikari pool reporting acquisition timeouts"
          description: |
            A request waited longer than `spring.datasource.hikari.connection-timeout`
            for a connection. Either the pool is too small for current load,
            a query is hanging, or Postgres is slow.

  - orgId: 1
    name: peepbot-warning
    folder: Peep Bot
    interval: 1m
    rules:
      # ──────────────────────────────────────────────────────────────────────
      # Listener invocation 3-second budget breach ratio. This is the same
      # signal the Discord dashboard surfaces — if more than 5% of invocations
      # exceed 3s for 10m, ack failures are imminent.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-listener-3s-budget
        title: Lifecycle listener 3s budget breach ratio elevated
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                1 - (
                  sum(rate(lifecycle_listener_invoke_milliseconds_bucket{service_namespace="peep-bot", le="3000"}[5m]))
                  /
                  clamp_min(sum(rate(lifecycle_listener_invoke_milliseconds_count{service_namespace="peep-bot"}[5m])), 1)
                )
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.05] }
        labels:
          severity: warning
          component: lifecycle
        annotations:
          summary: ">5% of lifecycle listener invocations exceeding 3s"
          description: |
            See the Discord dashboard — slowest listener_name buckets identify
            the culprit. Typically Discord API slowness or a downstream HTTP call
            without proper timeouts.

      # ──────────────────────────────────────────────────────────────────────
      # Discord listener pool pinned at max. With max=16, if active==pool_size
      # and the queue is non-empty we're at the edge of CallerRunsPolicy kicking in.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-discord-pool-pinned
        title: Discord listener pool pinned at max threads
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                min(
                  executor_active_threads{service_namespace="peep-bot", name="discordListenerExecutor"}
                  /
                  clamp_min(executor_pool_max_threads{service_namespace="peep-bot", name="discordListenerExecutor"}, 1)
                )
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gte, params: [1] }
        labels:
          severity: warning
          component: discord
        annotations:
          summary: "discordListenerExecutor active threads at pool max"
          description: |
            Pool is pinned at max. Often a precursor to the queue alert.
            Inspect the slowest interactions on the Discord dashboard.

      # ──────────────────────────────────────────────────────────────────────
      # HTTP p99 latency on non-actuator endpoints.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-http-p99
        title: Backend HTTP p99 latency elevated
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                histogram_quantile(0.99,
                  sum by (le) (rate(http_server_requests_milliseconds_bucket{
                    service_namespace="peep-bot",
                    uri!~"/actuator.*"
                  }[5m]))
                )
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [1500] }
        labels:
          severity: warning
          component: http
        annotations:
          summary: "p99 HTTP latency > 1.5s for 10m"
          description: |
            Drill into per-uri p99 on the HTTP dashboard.

      # ──────────────────────────────────────────────────────────────────────
      # Hikari pool near exhaustion. Different signal from timeouts —
      # this catches sustained high utilisation before timeouts hit.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-hikari-saturated
        title: Hikari connection pool > 90% utilised
        condition: B
        for: 5m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                sum(hikaricp_connections_active{service_namespace="peep-bot"})
                /
                clamp_min(sum(hikaricp_connections_max{service_namespace="peep-bot"}), 1)
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.9] }
        labels:
          severity: warning
          component: db
        annotations:
          summary: "Hikari pool > 90% active for 5m"
          description: |
            Increase pool size or hunt for queries holding connections too long.

      # ──────────────────────────────────────────────────────────────────────
      # JVM heap pressure. Catches slow leaks before OOM kills the container.
      # ──────────────────────────────────────────────────────────────────────
      - uid: peepbot-jvm-heap
        title: JVM heap > 85% used
        condition: B
        for: 15m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                sum(jvm_memory_used_bytes{service_namespace="peep-bot", area="heap"})
                /
                clamp_min(sum(jvm_memory_max_bytes{service_namespace="peep-bot", area="heap"}), 1)
              instant: true
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.85] }
        labels:
          severity: warning
          component: jvm
        annotations:
          summary: "JVM heap utilisation > 85% for 15m"
          description: |
            Check the JVM dashboard for GC pause times and old-gen growth.
            A slow leak shows as a sawtooth that never returns to baseline.

  - orgId: 1
    name: peepbot-info
    folder: Peep Bot
    interval: 1m
    rules:
      - uid: peepbot-app-down
        title: Peep Bot metric stream absent ≥5m
        condition: B
        for: 5m
        noDataState: Alerting
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: absent_over_time(application_ready_time_milliseconds{service_namespace="peep-bot"}[5m])
              queryType: instant
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        labels:
          severity: info
          component: lifecycle
        annotations:
          summary: "Peep Bot metric stream absent ≥5m"
          description: |
            No `application_ready_time_milliseconds` samples seen for 5m.
            Either the app is down, the OTel pipeline is broken, or the
            scrape is failing. host-down covers the paging case at the
            target level; this rule adds component context for history.

      - uid: peepbot-restart-spike
        title: Peep Bot JVM restart spike
        condition: B
        for: 0s
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: changes(process_start_time_seconds{service_namespace="peep-bot"}[1h])
              queryType: instant
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [2] }
        labels:
          severity: info
          component: lifecycle
        annotations:
          summary: "Peep Bot JVM restarted {{ $value }} times in 1h"

      - uid: peepbot-log-error-rate
        title: Peep Bot log ERROR rate elevated
        condition: B
        for: 10m
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              refId: A
              expr: sum(rate({service_name=~"peepbot-backend|peepbot-staging-backend"} |= "ERROR" [5m]))
              queryType: instant
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.5] }
        labels:
          severity: info
          component: logs
        annotations:
          summary: "Peep Bot ERROR log rate > 0.5/s"
          description: |
            Background tasks or listeners that swallow exceptions won't show
            in http_server_requests metrics. Drill in via Loki:
              {service_name=~"peepbot-backend|peepbot-staging-backend"} |= "ERROR"

      - uid: peepbot-listener-failure-rate
        title: Lifecycle listener failure ratio >5%
        condition: B
        for: 10m
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: |
                sum(rate(lifecycle_listener_invoke_milliseconds_count{service_namespace="peep-bot",error!="none"}[10m]))
                / sum(rate(lifecycle_listener_invoke_milliseconds_count{service_namespace="peep-bot"}[10m]))
              queryType: instant
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.05] }
        labels:
          severity: info
          component: lifecycle
        annotations:
          summary: "Lifecycle listener failure ratio >5%"
          description: |
            More than 5% of listener invocations are completing with a
            non-none `error` label. This precedes the lifecycle-stuck
            critical alert by indicating sustained transient failures.

      - uid: peepbot-otel-collector-down
        title: OTel collector down ≥5m
        condition: B
        for: 5m
        noDataState: Alerting
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: up{job="otelcol-contrib"} == 0
              queryType: instant
          - refId: B
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [-1] }
        labels:
          severity: info
          component: telemetry
        annotations:
          summary: "OTel collector {{ $labels.instance }} down ≥5m"
          description: |
            If the collector is down, peep-bot metrics stop arriving and all
            other peep-bot rules silently resolve. host-down catches the
            paging case; this rule provides telemetry-layer attribution.
