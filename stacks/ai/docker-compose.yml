version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false
      - DEFAULT_MODELS=mistral-nemo:12b-instruct-2407-q8_0
    volumes:
      - /ssd/fast_storage/docker/open-webui:/app/backend/data
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat.rule=Host(`chat.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))"
      - "traefik.http.routers.chat.entrypoints=websecure"
      - "traefik.http.routers.chat.tls.certresolver=leresolver"
      - "traefik.http.services.chat.loadbalancer.server.port=8080"
    networks:
      - homelab_default

  ollama:
    image: ollama/ollama:latest@sha256:e23e6499890325d31f3454cdc83f7a613a2423c8a9e167bbafea0b0e3c27d7c6
    container_name: ollama
    restart: unless-stopped
    volumes:
      - /ssd/fast_storage/docker/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_THREAD=10
      - OLLAMA_CONTEXT_LENGTH=8192
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull mistral-nemo:12b-instruct-2407-q8_0 && wait"]
    deploy:
      resources:
        limits:
          memory: 20G
        reservations:
          memory: 16G
    networks:
      - homelab_default

networks:
  homelab_default:
    external: true
