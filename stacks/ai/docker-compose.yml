version: '3.8'

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:b80a96e14bb15ea79aec96fbdad4aeab6b3ee7b61520d83b5dbc8c4f47d433a9
    container_name: open-webui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODELS=mistral-nemo:12b-instruct-2407-q8_0
    volumes:
      - /ssd/services/open-webui:/app/backend/data
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat.rule=Host(`chat.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))"
      - "traefik.http.routers.chat.entrypoints=websecure"
      - "traefik.http.routers.chat.tls.certresolver=leresolver"
      - "traefik.http.services.chat.loadbalancer.server.port=8080"
    networks:
      - homelab_default

  ollama:
    image: ollama/ollama:latest@sha256:5a5d014aa774f78ebe1340c0d4afc2e35afc12a2c3b34c84e71f78ea20af4ba3
    container_name: ollama
    restart: unless-stopped
    volumes:
      - /ssd/services/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_THREAD=10
      - OLLAMA_CONTEXT_LENGTH=8192
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull mistral-nemo:12b-instruct-2407-q8_0 && wait"]
    deploy:
      resources:
        limits:
          memory: 20G
        reservations:
          memory: 16G
    networks:
      - homelab_default

networks:
  homelab_default:
    external: true
