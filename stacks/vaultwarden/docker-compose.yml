version: '3.8'

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  vaultwarden:
    <<: *logging
    image: vaultwarden/server:1.36.0@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
    container_name: vaultwarden
    hostname: bitwarden
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /ssd/services/vaultwarden:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.rule=Host(`bitwarden.tylercash.dev`) && ClientIP(`10.0.0.0/8`)
      - traefik.http.routers.vaultwarden.service=vaultwarden
      - traefik.http.routers.vaultwarden.tls.certresolver=leresolver
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s

networks:
  homelab_default:
    external: true
