version: '3.8'

services:
  vaultwarden:
    image: vaultwarden/server:1.35.6@sha256:93072633c6b125628419097fc951d1ce448422a1af1d653805520a8ba90f6956
    container_name: vaultwarden
    hostname: bitwarden
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /ssd/services/vaultwarden:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.rule=Host(`bitwarden.tylercash.dev`) && ClientIP(`10.0.0.0/8`)
      - traefik.http.routers.vaultwarden.service=vaultwarden
      - traefik.http.routers.vaultwarden.tls.certresolver=leresolver
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s

networks:
  homelab_default:
    external: true
