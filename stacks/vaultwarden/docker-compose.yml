version: '3.8'

services:
  vaultwarden:
    image: vaultwarden/server:1.35.4@sha256:43498a94b22f9563f2a94b53760ab3e710eefc0d0cac2efda4b12b9eb8690664
    container_name: vaultwarden
    hostname: bitwarden
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /ssd/services/vaultwarden:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.rule=Host(`bitwarden.tylercash.dev`) && ClientIP(`10.0.0.0/8`)
      - traefik.http.routers.vaultwarden.service=vaultwarden
      - traefik.http.routers.vaultwarden.tls.certresolver=leresolver
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s

networks:
  homelab_default:
    external: true
