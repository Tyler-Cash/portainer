version: '3.8'

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.12@sha256:c871ddf7ad1b4125218e5f010b59724f0d2bb299714c5bd6ba7c1e99462450a7
    container_name: openclaw-gateway
    restart: unless-stopped
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan"]
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      - OPENCLAW_DEFAULT_MODEL=ollama/mistral-nemo:12b-instruct-2407-q8_0
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - /ssd/fast_storage/docker/openclaw/config:/home/node/.openclaw
      - /ssd/fast_storage/docker/openclaw/workspace:/home/node/openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`claw.tylercash.dev`) && (ClientIP(`10.0.0.0/8`) || ClientIP(`172.19.0.0/24`))"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=leresolver"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    networks:
      - homelab_default

  ollama:
    image: ollama/ollama:latest@sha256:e23e6499890325d31f3454cdc83f7a613a2423c8a9e167bbafea0b0e3c27d7c6
    container_name: ollama
    restart: unless-stopped
    volumes:
      - /ssd/fast_storage/docker/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_THREAD=10
      - OLLAMA_CONTEXT_LENGTH=32768
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull mistral-nemo:12b-instruct-2407-q8_0 && wait"]
    deploy:
      resources:
        limits:
          memory: 20G
        reservations:
          memory: 16G
    networks:
      - homelab_default

networks:
  homelab_default:
    external: true
