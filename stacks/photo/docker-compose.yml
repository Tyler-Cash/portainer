services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.1@sha256:aa7fe8eec3130742d07498dac7e02baa2d32a903573810ba95ed11f155c7eac1
    container_name: immich-server
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /hdd/docker/immich/upload:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Australia/Sydney
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      # OpenTelemetry
      - IMMICH_TELEMETRY_INCLUDE=all
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4318
      - OTEL_SERVICE_NAME=immich-server
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    healthcheck:
      disable: false
    labels:
      - traefik.enable=true
      - traefik.http.routers.immich.service=immich
      - traefik.http.routers.immich.rule=Host(`photos.tylercash.dev`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.services.immich.loadbalancer.server.scheme=http
      - traefik.http.services.immich.loadbalancer.server.port=2283
      - traefik.http.routers.immich.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.1@sha256:cafc1ff51b95a931d17d69226435bbb28ea314f151598b8b087391c232d00ab6
    container_name: immich-machine-learning
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - immich-model-cache:/cache
    environment:
      - TZ=Australia/Sydney
    healthcheck:
      disable: false
    labels:
      - com.centurylinklabs.watchtower.enable=true

  immich-redis:
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - homelab_default
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      - homelab_default
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /ssd/fast_storage/docker/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false

volumes:
  immich-model-cache:

networks:
  homelab_default:
    external: true
