x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"

services:
  immich-server:
    <<: *logging
    image: ghcr.io/immich-app/immich-server:v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
    container_name: immich-server
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - /hdd/photos:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Australia/Sydney
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      # OpenTelemetry
      - IMMICH_TELEMETRY_INCLUDE=all
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4318
      - OTEL_SERVICE_NAME=immich-server
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    healthcheck:
      disable: false
    labels:
      - traefik.enable=true
      - traefik.http.routers.immich.service=immich
      - traefik.http.routers.immich.rule=Host(`photos.tylercash.dev`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.services.immich.loadbalancer.server.scheme=http
      - traefik.http.services.immich.loadbalancer.server.port=2283
      - traefik.http.routers.immich.tls.certresolver=leresolver
      - com.centurylinklabs.watchtower.enable=true

  immich-machine-learning:
    <<: *logging
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
    container_name: immich-machine-learning
    restart: unless-stopped
    networks:
      - homelab_default
    volumes:
      - immich-model-cache:/cache
    environment:
      - TZ=Australia/Sydney
    healthcheck:
      disable: false
    labels:
      - com.centurylinklabs.watchtower.enable=true

  immich-redis:
    <<: *logging
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - homelab_default
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  immich-postgres:
    <<: *logging
    image: ghcr.io/immich-app/postgres:16-vectorchord0.5.3-pgvector0.8.1@sha256:e730130441a275f35ca1e2436d826948ea98dfe3efe85b6fb620f2c696822f18
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      - homelab_default
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - /ssd/databases/immich-pg16:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false

volumes:
  immich-model-cache:

networks:
  homelab_default:
    external: true
