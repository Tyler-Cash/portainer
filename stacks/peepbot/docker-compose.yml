x-traefik:
  entrypoint: &entrypoint websecure
  certresolver: &certresolver leresolver
  backend-port: &backend-port 8080
  frontend-port: &frontend-port 80

x-postgres:
  password: &postgresPassword ${POSTGRES_PASSWORD}
  username: &postgresUser peepbot

x-spring-datasource: &spring-datasource
  SPRING_DATASOURCE_URL: &datasourceUrl jdbc:postgresql://peepbot-postgres:5432/peepbot
  SPRING_DATASOURCE_USERNAME: *postgresUser
  SPRING_DATASOURCE_PASSWORD: *postgresPassword

x-backend-defaults: &backend-defaults
  restart: always
  networks:
    - homelab_default
  depends_on:
    peepbot-postgres:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:9001/actuator/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"
  labels: &backend-labels
    traefik.enable: true
    com.centurylinklabs.watchtower.enable: true

x-frontend-defaults: &frontend-defaults
  restart: always
  networks:
    - homelab_default
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  labels: &frontend-labels
    traefik.enable: true
    com.centurylinklabs.watchtower.enable: true

services:
  peepbot-postgres:
    image: pgvector/pgvector:pg18@sha256:b48c110f4911eb3d73ba7b6bd8964a5f26be740c2d580158530471c3c0f66487
    container_name: peepbot-postgres
    restart: always
    shm_size: 128mb
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    volumes:
      - /ssd/databases/peepbot:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: *postgresPassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  peepbot-backend:
    <<: *backend-defaults
    image: ghcr.io/tyler-cash/peep-bot-backend:3.19.0
    container_name: peepbot-backend
    volumes:
      - peepbot-djl-cache:/root/.djl.ai
    environment:
      <<: *spring-datasource
      DEV_TYLERCASH_DISCORD_GUILD_ID: ${DEV_TYLERCASH_DISCORD_GUILD_ID}
      DEV_TYLERCASH_DISCORD_TOKEN: ${DEV_TYLERCASH_DISCORD_TOKEN}
      DEV_TYLERCASH_IMMICH_API_KEY: ${DEV_TYLERCASH_IMMICH_API_KEY}
      DEV_TYLERCASH_IMMICH_BASE_URL: ${DEV_TYLERCASH_IMMICH_BASE_URL}
      DEV_TYLERCASH_IMMICH_ENABLED: ${DEV_TYLERCASH_IMMICH_ENABLED}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://signoz-otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://signoz-otel-collector:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET}
    labels:
      <<: *backend-labels
      traefik.http.routers.peepbot-backend.entrypoints: *entrypoint
      traefik.http.routers.peepbot-backend.rule: Host(`api.event.tylercash.dev`)
      traefik.http.routers.peepbot-backend.service: peepbot-backend
      traefik.http.routers.peepbot-backend.tls.certresolver: *certresolver
      traefik.http.services.peepbot-backend.loadbalancer.server.port: *backend-port

  peepbot-frontend:
    <<: *frontend-defaults
    image: ghcr.io/tyler-cash/peep-bot-frontend:3.10.5@sha256:667159f3b510d1c00f4497628b231a206cd0d5d3271ff0ae4fdfba010998e5ba
    container_name: peepbot-frontend
    labels:
      <<: *frontend-labels
      traefik.http.routers.peepbot-frontend.entrypoints: *entrypoint
      traefik.http.routers.peepbot-frontend.rule: Host(`event.tylercash.dev`)
      traefik.http.routers.peepbot-frontend.service: peepbot-frontend
      traefik.http.routers.peepbot-frontend.tls.certresolver: *certresolver
      traefik.http.services.peepbot-frontend.loadbalancer.server.port: *frontend-port

  adminer:
    image: adminer:5.4.2@sha256:41898b976011fd87f2d3037366ad97f7d89fddfebc8aa8b3a7d77d0c465aa37b
    restart: always
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    depends_on:
      peepbot-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: true
      traefik.http.routers.peepbot-adminer.entrypoints: *entrypoint
      traefik.http.routers.peepbot-adminer.rule: Host(`adminer.tylercash.dev`) && ClientIP(`10.0.0.0/8`)
      traefik.http.routers.peepbot-adminer.service: peepbot-adminer
      traefik.http.routers.peepbot-adminer.tls.certresolver: *certresolver
      traefik.http.services.peepbot-adminer.loadbalancer.server.port: *backend-port

volumes:
  peepbot-djl-cache:

networks:
  homelab_default:
    external: true
