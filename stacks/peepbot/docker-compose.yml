x-traefik:
  entrypoint: &entrypoint websecure
  certresolver: &certresolver leresolver
  backend-port: &backend-port 8080
  frontend-port: &frontend-port 80

x-postgres:
  password: &postgresPassword ${POSTGRES_PASSWORD}
  username: &postgresUser peepbot

x-spring-datasource: &spring-datasource
  SPRING_DATASOURCE_URL: &datasourceUrl jdbc:postgresql://peepbot-postgres:5432/peepbot
  SPRING_DATASOURCE_USERNAME: *postgresUser
  SPRING_DATASOURCE_PASSWORD: *postgresPassword

x-backend-defaults: &backend-defaults
  restart: always
  networks:
    - homelab_default
  depends_on:
    peepbot-postgres:
      condition: service_healthy
    # Block backend start until the Pyroscope agent jar is present in the shared volume —
    # -javaagent on a missing file aborts JVM startup. The init is idempotent + cached, so
    # this only does real work (download) on the first deploy.
    peepbot-pyroscope-init:
      condition: service_completed_successfully
  healthcheck:
    # Bash /dev/tcp probe — works on any Paketo run image (full, base, or tiny)
    # without depending on curl/wget being installed. Inspects the response body
    # for "status":"UP" so partial-startup or shutdown states fail correctly.
    test:
      - CMD
      - bash
      - -c
      - "exec 3<>/dev/tcp/localhost/9001; printf 'GET /actuator/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3; grep -q '\"status\":\"UP\"' <&3"
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"
  labels: &backend-labels
    traefik.enable: true
    com.centurylinklabs.watchtower.enable: true

x-frontend-defaults: &frontend-defaults
  restart: always
  networks:
    - homelab_default
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
      labels: "com.docker.compose.service,com.docker.compose.project"
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  labels: &frontend-labels
    traefik.enable: true
    com.centurylinklabs.watchtower.enable: true

services:
  # Downloads the pinned Pyroscope async-profiler agent jar once into the shared
  # pyroscope-agent volume. Idempotent: skips the download (and the apk/network access) when
  # the jar is already cached, so backend restarts don't depend on internet egress.
  peepbot-pyroscope-init:
    image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    container_name: peepbot-pyroscope-init
    restart: "no"
    networks:
      - homelab_default
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if [ ! -s /agent/pyroscope.jar ]; then
          apk add --no-cache wget ca-certificates >/dev/null
          wget -qO /agent/pyroscope.jar \
            "https://github.com/grafana/pyroscope-java/releases/download/v2.5.2/pyroscope.jar"
        fi
        # Sanity-check the jar landed (>100KB) so a bad download fails the init loudly
        # instead of producing a JVM that aborts on a truncated -javaagent. $$ escapes the
        # $ from docker-compose interpolation so the container shell sees $(stat ...).
        [ "$$(stat -c%s /agent/pyroscope.jar)" -gt 100000 ]
    volumes:
      - pyroscope-agent:/agent

  peepbot-postgres:
    image: pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
    container_name: peepbot-postgres
    restart: always
    shm_size: 128mb
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    volumes:
      - /ssd/databases/peepbot:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_PASSWORD: *postgresPassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  peepbot-backend:
    <<: *backend-defaults
    image: ghcr.io/tyler-cash/peep-bot-backend:3.65.16@sha256:76e37c48ff9e9ee4539e2a83fe39c5af5a596b531f94266b539f1dcdf166e4ae
    container_name: peepbot-backend
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    volumes:
      - peepbot-djl-cache:/root/.djl.ai
      - pyroscope-agent:/agent:ro
    env_file:
      - .env
    environment:
      <<: *spring-datasource
      # OTLP endpoints for all three signals (metrics/traces/logs) default to
      # http://grafana-lgtm:4318 in the backend's application.yaml, so no env-var
      # wiring is needed here.
      #
      # Continuous profiling — the Pyroscope async-profiler agent (jar provided by
      # peepbot-pyroscope-init in the shared volume) ships CPU + allocation + lock flame
      # graphs to the Pyroscope server bundled in grafana-lgtm. APPLICATION_NAME matches
      # resource.service.name so Grafana can link traces -> profiles. itimer is the
      # container-safe profiler event (no perf_event_paranoid / CAP_PERFMON needed).
      #
      # Use _JAVA_OPTIONS, NOT JAVA_TOOL_OPTIONS: Paketo's launch helpers OVERWRITE
      # JAVA_TOOL_OPTIONS with their computed memory/NMT flags, silently dropping a
      # user-supplied -javaagent (verified by running the image locally). The JVM also honors
      # _JAVA_OPTIONS, which Paketo leaves untouched, so the agent attaches and coexists with
      # the buildpack's JAVA_TOOL_OPTIONS memory tuning.
      DEV_TYLERCASH_BOTADMINS: ${DEV_TYLERCASH_BOTADMINS}
      DEV_TYLERCASH_DISCORD_GUILD_ID: ${DEV_TYLERCASH_DISCORD_GUILD_ID}
      DEV_TYLERCASH_DISCORD_TOKEN: ${DEV_TYLERCASH_DISCORD_TOKEN}
      DEV_TYLERCASH_IMMICH_API_KEY: ${DEV_TYLERCASH_IMMICH_API_KEY}
      DEV_TYLERCASH_IMMICH_BASE_URL: ${DEV_TYLERCASH_IMMICH_BASE_URL}
      DEV_TYLERCASH_IMMICH_ENABLED: ${DEV_TYLERCASH_IMMICH_ENABLED}
      DEV_TYLERCASH_PLACES_API_KEY: ${DEV_TYLERCASH_PLACES_API_KEY}
      MANAGEMENT_HEALTH_DISKSPACE_ENABLED: false
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://signoz-otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://signoz-otel-collector:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      PYROSCOPE_APPLICATION_NAME: peepbot-backend
      PYROSCOPE_FORMAT: jfr
      PYROSCOPE_LABELS: "namespace=peep-bot,env=production"
      PYROSCOPE_PROFILER_ALLOC: 512k
      PYROSCOPE_PROFILER_EVENT: itimer
      PYROSCOPE_PROFILER_LOCK: 10ms
      PYROSCOPE_SERVER_ADDRESS: http://grafana-lgtm:4040
      SPRING_PROFILES_ACTIVE: prod
      _JAVA_OPTIONS: "-javaagent:/agent/pyroscope.jar -XX:+UnlockDiagnosticVMOptions -XX:+DebugNonSafepoints -XX:MaxDirectMemorySize=256m -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp"
      # ONE-SHOT: re-classify every event whose category was assigned before this cutoff
      # under the new v2 prompt + mistral-nemo model (peep-bot v3.53.x). Runs once per
      # container start at 1 event/sec. Cutoff is comfortably past the expected deploy of
      # the v3.53.x release. UNSET this var on the next image bump to disable the runner.
      PEEPBOT_CLASSIFIER_BACKFILL_RUN_BEFORE: "2026-05-26T00:00:00+10:00"
    labels:
      <<: *backend-labels
      traefik.http.routers.peepbot-backend.entrypoints: *entrypoint
      traefik.http.routers.peepbot-backend.rule: Host(`api.event.tylercash.dev`)
      traefik.http.routers.peepbot-backend.service: peepbot-backend
      traefik.http.routers.peepbot-backend.tls.certresolver: *certresolver
      traefik.http.services.peepbot-backend.loadbalancer.server.port: *backend-port

  peepbot-frontend:
    <<: *frontend-defaults
    image: ghcr.io/tyler-cash/peep-bot-frontend:3.10.5@sha256:667159f3b510d1c00f4497628b231a206cd0d5d3271ff0ae4fdfba010998e5ba
    container_name: peepbot-frontend
    labels:
      <<: *frontend-labels
      traefik.http.routers.peepbot-frontend.entrypoints: *entrypoint
      traefik.http.routers.peepbot-frontend.rule: Host(`event.tylercash.dev`)
      traefik.http.routers.peepbot-frontend.service: peepbot-frontend
      traefik.http.routers.peepbot-frontend.tls.certresolver: *certresolver
      traefik.http.services.peepbot-frontend.loadbalancer.server.port: *frontend-port

  adminer:
    image: adminer:5.4.2@sha256:983261ecc40a4aaf11e25aeda8ef821f5a43a9f024b3967c81cbcc0e6ce43ba3
    restart: always
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    depends_on:
      peepbot-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: true
      traefik.http.routers.peepbot-adminer.entrypoints: *entrypoint
      traefik.http.routers.peepbot-adminer.rule: Host(`adminer.tylercash.dev`) && ClientIP(`10.0.0.0/8`)
      traefik.http.routers.peepbot-adminer.service: peepbot-adminer
      traefik.http.routers.peepbot-adminer.tls.certresolver: *certresolver
      traefik.http.services.peepbot-adminer.loadbalancer.server.port: *backend-port

volumes:
  peepbot-djl-cache:
  # Holds the Pyroscope agent jar, populated by peepbot-pyroscope-init and mounted read-only
  # into peepbot-backend. Persists across restarts so the jar is downloaded only once.
  pyroscope-agent:

networks:
  homelab_default:
    external: true
