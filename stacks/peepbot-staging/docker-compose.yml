x-traefik:
  entrypoint: &entrypoint websecure
  certresolver: &certresolver leresolver
  backend-port: &backend-port 8080
  frontend-port: &frontend-port 80

x-postgres:
  password: &postgresPassword ${POSTGRES_PASSWORD}
  username: &postgresUser peepbot

x-spring-datasource: &spring-datasource
  SPRING_DATASOURCE_URL: jdbc:postgresql://peepbot-postgres:5432/peepbot_staging
  SPRING_DATASOURCE_USERNAME: *postgresUser
  SPRING_DATASOURCE_PASSWORD: *postgresPassword

services:
  peepbot-staging-init-db:
    image: pgvector/pgvector:pg18@sha256:b48c110f4911eb3d73ba7b6bd8964a5f26be740c2d580158530471c3c0f66487
    container_name: peepbot-staging-init-db
    restart: "no"
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    environment:
      PGUSER: *postgresUser
      PGPASSWORD: *postgresPassword
    entrypoint: >
      sh -c "until pg_isready -h peepbot-postgres ; do sleep 2; done &&
      psql -h peepbot-postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'peepbot_staging'\" | grep -q 1 ||
      psql -h peepbot-postgres -c 'CREATE DATABASE peepbot_staging;'"

  peepbot-staging-backend:
    image: ghcr.io/tyler-cash/peep-bot-backend:3.33.0@sha256:1702e96e13176ceea254f561d2e35665f98655d3958fc6dc27a0a1f9d34738e3
    container_name: peepbot-staging-backend
    restart: always
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    volumes:
      - peepbot-staging-djl-cache:/root/.djl.ai
    depends_on:
      peepbot-staging-init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      <<: *spring-datasource
      SPRING_PROFILES_ACTIVE: staging
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_DISCORD_CLIENT_SECRET}
      DEV_TYLERCASH_BOTADMINS: ${DEV_TYLERCASH_BOTADMINS}
      DEV_TYLERCASH_DISCORD_GUILD_ID: ${DEV_TYLERCASH_DISCORD_GUILD_ID}
      DEV_TYLERCASH_DISCORD_TOKEN: ${DEV_TYLERCASH_DISCORD_TOKEN}
      DEV_TYLERCASH_IMMICH_BASE_URL: ${DEV_TYLERCASH_IMMICH_BASE_URL}
      DEV_TYLERCASH_IMMICH_ENABLED: ${DEV_TYLERCASH_IMMICH_ENABLED}
      DEV_TYLERCASH_IMMICH_API_KEY: ${DEV_TYLERCASH_IMMICH_API_KEY}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://signoz-otel-collector:4318/v1/traces
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://signoz-otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_LOGGING_EXPORT_ENDPOINT: http://signoz-otel-collector:4318/v1/logs
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    labels:
      traefik.enable: true
      traefik.http.routers.peepbot-staging-backend.entrypoints: *entrypoint
      traefik.http.routers.peepbot-staging-backend.rule: Host(`api.event-staging.tylercash.dev`)
      traefik.http.routers.peepbot-staging-backend.service: peepbot-staging-backend
      traefik.http.routers.peepbot-staging-backend.tls.certresolver: *certresolver
      traefik.http.services.peepbot-staging-backend.loadbalancer.server.port: *backend-port
      com.centurylinklabs.watchtower.enable: true

  peepbot-staging-frontend:
    image: ghcr.io/tyler-cash/peep-bot-frontend:3.10.5@sha256:667159f3b510d1c00f4497628b231a206cd0d5d3271ff0ae4fdfba010998e5ba
    container_name: peepbot-staging-frontend
    restart: always
    networks:
      - homelab_default
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        labels: "com.docker.compose.service,com.docker.compose.project"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: true
      traefik.http.routers.peepbot-staging-frontend.entrypoints: *entrypoint
      traefik.http.routers.peepbot-staging-frontend.rule: Host(`event-staging.tylercash.dev`)
      traefik.http.routers.peepbot-staging-frontend.service: peepbot-staging-frontend
      traefik.http.routers.peepbot-staging-frontend.tls.certresolver: *certresolver
      traefik.http.services.peepbot-staging-frontend.loadbalancer.server.port: *frontend-port
      com.centurylinklabs.watchtower.enable: true

volumes:
  peepbot-staging-djl-cache:

networks:
  homelab_default:
    external: true
