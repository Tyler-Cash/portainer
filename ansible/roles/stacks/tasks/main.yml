- name: Ensure stack directories exist
  ansible.builtin.file:
    path: "/opt/stacks/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ stacks | list }}"
  when: item not in stacks_skip

# Sync every file under stacks/<name>/ to /opt/stacks/<name>/ via ssh-rsync.
# delete=true cleans up paths left behind by earlier failed deploys (e.g.
# Docker-created empty dirs at file bind-mount sources that would otherwise
# persist). The excludes preserve the .env file written later in this play
# and keep cleartext .env.secret.dec out of the deploy.
- name: Sync stack files
  ansible.posix.synchronize:
    src: "{{ stacks_src_dir }}/{{ item }}/"
    dest: "/opt/stacks/{{ item }}/"
    delete: true
    rsync_opts:
      - "--exclude=.env"
      - "--exclude=.env.secret"
      - "--exclude=.env.secret.dec"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip

# Fill in any missing ZFS datasets a stack's docker-compose.yml bind-mounts
# reference under /ssd or /hdd, before compose gets a chance to have Docker
# create them as plain directories on first `up`. Runs after the sync above
# so it reads each stack's just-deployed compose file. Never touches a path
# that already exists.
- name: Ensure ZFS datasets exist for stack bind mounts
  ansible.builtin.script:
    cmd: "ensure-zfs-datasets.sh /opt/stacks/{{ item }}/docker-compose.yml"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip
  register: zfs_dataset_result
  changed_when: "'CREATED' in zfs_dataset_result.stdout"

# Compute a content hash over each stack's source tree and stash it in a fact.
# Stacks that want compose-recreation-on-content-change put __STACK_CONTENT_HASH__
# somewhere in their docker-compose.yml (an env var or label); the next task
# replaces the placeholder with the hash, so compose sees a definition diff and
# recreates affected containers. Stacks without the placeholder are no-ops.
- name: Compute content hash for each stack
  ansible.builtin.set_fact:
    stack_content_hashes: >-
      {{ stack_content_hashes | default({}) | combine({item: lookup('pipe',
         'cd ' + stacks_src_dir + '/' + item +
         ' && find . -type f ! -name .env ! -name .env.secret ! -name .env.secret.dec' +
         ' -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -c1-12') }) }}
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip

- name: Stamp __STACK_CONTENT_HASH__ into deployed compose
  ansible.builtin.replace:
    path: "/opt/stacks/{{ item }}/docker-compose.yml"
    regexp: "__STACK_CONTENT_HASH__"
    replace: "{{ stack_content_hashes[item] }}"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip and item in (stack_content_hashes | default({}))

# homepage's config lives outside /opt/stacks/ because the compose bind-mounts
# from /ssd/services/homepage. Different target dir → still a special case.
- name: Sync homepage config
  ansible.builtin.copy:
    src: "{{ stacks_src_dir }}/homepage/config/"
    dest: /ssd/services/homepage/
    mode: "0644"
  when: "'homepage' not in stacks_skip and 'homepage' in stacks"

- name: Write .env file
  ansible.builtin.copy:
    content: "{% for key, value in stacks[item].items() %}{{ key }}={{ value | replace('$', '$$') }}\n{% endfor %}"
    dest: "/opt/stacks/{{ item }}/.env"
    mode: "0600"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip and stacks[item] | length > 0
  no_log: true

# docker compose up never rebuilds a build:-based service's image on its own —
# it only builds when the image doesn't exist yet. Without this, stacks like
# ts-clipper or zipline-transcoder would keep running their first-ever build
# forever. Gate an explicit `docker compose build` on the same content hash
# computed above so it only runs (and only costs deploy time) for stacks that
# actually changed. Markers live under /opt/build-hashes/, not
# /opt/stacks/<name>/, because the "Sync stack files" rsync above deletes
# anything in the latter that isn't tracked in the repo.
- name: Ensure the build-hash marker directory exists
  ansible.builtin.file:
    path: /opt/build-hashes
    state: directory
    mode: "0755"

- name: Read the previous build hash for each stack, if any
  ansible.builtin.slurp:
    src: "/opt/build-hashes/{{ item }}.hash"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip
  register: previous_build_hash_slurp
  ignore_errors: true

- name: Map each stack to its previous build hash
  ansible.builtin.set_fact:
    stack_previous_hashes: "{{ stack_previous_hashes | default({}) | combine({item.item: (item.content | b64decode if item.content is defined else '')}) }}"
  loop: "{{ previous_build_hash_slurp.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Build images only for stacks whose content changed since the last deploy
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "/opt/stacks/{{ item }}"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: >-
    item not in stacks_skip and
    stack_previous_hashes.get(item, '') != stack_content_hashes[item]
  register: build_result
  no_log: true
  ignore_errors: true

- name: Report docker compose build failures
  ansible.builtin.debug:
    msg: "docker compose build failed for stack '{{ item.item }}' with rc={{ item.rc }}"
  loop: "{{ build_result.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc is defined and item.rc != 0

- name: Fail if any docker compose build failed
  ansible.builtin.fail:
    msg: "One or more stacks failed to build"
  when: build_result.results | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | list | length > 0

- name: Record the new build hash for stacks that were rebuilt
  ansible.builtin.copy:
    content: "{{ stack_content_hashes[item.item] }}"
    dest: "/opt/build-hashes/{{ item.item }}.hash"
    mode: "0644"
  loop: "{{ build_result.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc is defined and item.rc == 0

- name: Run docker compose up
  ansible.builtin.command:
    cmd: docker compose up -d --remove-orphans --pull always
    chdir: "/opt/stacks/{{ item }}"
  loop: "{{ stacks | list }}"
  loop_control:
    label: "{{ item }}"
  when: item not in stacks_skip
  register: compose_result
  no_log: true
  ignore_errors: true

- name: Report docker compose failures
  ansible.builtin.debug:
    msg: "docker compose up failed for stack '{{ item.item }}' with rc={{ item.rc }}"
  loop: "{{ compose_result.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: (item.rc is defined and item.rc != 0) or (item.failed is defined and item.failed)

- name: Fail if any docker compose up failed
  ansible.builtin.fail:
    msg: "One or more stacks failed to start"
  when: compose_result.results | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | list | length > 0
