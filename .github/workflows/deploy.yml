name: Deploy stacks

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  configure-host:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          if ! command -v ansible-playbook &>/dev/null; then
            pip3 install --quiet ansible
          fi
          ansible-galaxy collection install community.general --quiet

      - name: Write SSH key
        run: |
          echo "$ANSIBLE_SSH_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"
          ssh-keygen -y -f "$RUNNER_TEMP/ansible_key" > "$RUNNER_TEMP/ansible_key.pub"
        env:
          ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}

      - name: Test - verify Ansible does not leak secrets
        run: |
          CANARY="CANARY_$(openssl rand -hex 8)\$DOLLAR_SUFFIX"
          mkdir -p "$RUNNER_TEMP/test-stacks/canary-stack"
          echo -e "services:\n  test:\n    image: nginx" > "$RUNNER_TEMP/test-stacks/canary-stack/docker-compose.yml"
          echo "{\"stacks\": {\"canary-stack\": {\"SECRET\": \"$CANARY\"}}}" > "$RUNNER_TEMP/canary_vars.json"

          OUTPUT=$(cd ansible && ANSIBLE_ROLES_PATH=roles ansible-playbook \
            -i tests/no-secrets-leak-inventory.yml \
            tests/no-secrets-leak.yml \
            --check \
            --extra-vars "@$RUNNER_TEMP/canary_vars.json" 2>&1 || true)

          if echo "$OUTPUT" | grep -qF "$CANARY"; then
            echo "FAIL: Secret leaked in Ansible output"
            echo "$OUTPUT" | grep -nF "$CANARY"
            exit 1
          fi
          echo "PASS: No secrets leaked in Ansible output"

      - name: Build stacks vars
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          stacks_json="{}"
          for stack_dir in stacks/*/; do
            stack=$(basename "$stack_dir")
            env_json="{}"
            if [ -f "$stack_dir/.env.secret" ] && [ -n "${SOPS_AGE_KEY:-}" ]; then
              env_json=$(SOPS_AGE_KEY="$SOPS_AGE_KEY" sops --decrypt "$stack_dir/.env.secret" \
                | grep -v '^#' | grep '=' \
                | jq -Rn '[inputs | split("=") | {(.[0]): (.[1:] | join("="))}] | add // {}')
            fi
            stacks_json=$(echo "$stacks_json" | jq --arg k "$stack" --argjson v "$env_json" '. + {($k): $v}')
          done
          echo "{\"stacks\": $stacks_json}" > "$RUNNER_TEMP/stacks_vars.json"

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST: ${{ vars.PORTAINER_HOST }}
          ANSIBLE_SSH_KEY_FILE: ${{ runner.temp }}/ansible_key
        run: |
          cd ansible && ANSIBLE_ROLES_PATH=roles ansible-playbook \
            -i inventory.yml playbooks/host.yml \
            --extra-vars "@$RUNNER_TEMP/stacks_vars.json"

      - name: Remove secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/ansible_key" "$RUNNER_TEMP/ansible_key.pub" "$RUNNER_TEMP/stacks_vars.json"
